<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="50%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- App icon background - rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="0" y="0" width="64" height="32" rx="16" fill="white" opacity="0.05"/>

  <!-- Chat bubble body (solid white) -->
  <path d="M11 18 Q11 11 18 11 L46 11 Q53 11 53 18 L53 36 Q53 43 46 43 L36 43 L32 52 L28 43 L18 43 Q11 43 11 36 Z" fill="white"/>

  <!-- Lightning bolt (amber/gold) inside bubble -->
  <path d="M34.5 17 L26 31 H31.5 L29.5 45 L38 31 H32.5 Z" fill="url(#badge)"/>

  <!-- AI dot badge - top right corner -->
  <circle cx="50" cy="14" r="8" fill="url(#badge)"/>
  <text x="50" y="18" font-family="Arial Black,Arial,sans-serif" font-size="7.5" font-weight="900" fill="white" text-anchor="middle">AI</text>
</svg>
