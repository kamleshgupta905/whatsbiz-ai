<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded-square background -->
  <rect width="64" height="64" rx="14" fill="#111827"/>

  <!-- WhatsApp chat bubble in orange/amber -->
  <path d="M32 9 C18.2 9 7 19.1 7 31.5 c0 5.3 2 10.2 5.4 14L10 55 l10.4-2.7 C23.3 53.4 27.5 54.2 32 54.2 c13.8 0 25-10.1 25-22.7 C57 19.1 45.8 9 32 9 Z" fill="url(#amber)"/>

  <!-- Inner white circle area for contrast -->
