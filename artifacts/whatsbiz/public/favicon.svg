  <!-- Bold "W" letter in amber -->
  <text x="32" y="37" font-family="Arial Black,Arial,sans-serif" font-size="17" font-weight="900" fill="url(#amber)" text-anchor="middle" letter-spacing="-1">W</text>

  <!-- Small "AI" badge top-right -->
  <rect x="41" y="7" width="16" height="10" rx="5" fill="#F59E0B"/>
  <text x="49" y="15" font-family="Arial Black,Arial,sans-serif" font-size="6.5" font-weight="900" fill="#111827" text-anchor="middle">AI</text>
</svg>
